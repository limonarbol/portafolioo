<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapbook Portafolio — LimonArbol</title>
    <style>
        /* PALETA PASTEL (Tus colores LimonArbol + Vibras OMYO) */
        :root {
            --bg-lavanda: #dbe4f9;      /* Fondo texturizado azul/lavanda claro */
            --hoja-blanca: #fbfbfb;     /* Color de las hojas de papel */
            --borde-foto: #ffffff;      /* Marco de foto instantánea */
            --amarillo-pastel: #fff8cd;  /* Detalles de stickers */
            --azul-pastel: #bce3ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-lavanda);
            /* Textura sutil para el fondo exterior */
            background-image: radial-gradient(rgba(255,255,255,0.5) 2px, transparent 0);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* CONTENEDOR DEL CUADERNO */
        .notebook-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9; /* Mantiene la proporción del cuaderno original */
            background-color: var(--hoja-blanca);
            border-radius: 8px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.15),
                -5px 5px 0px #f0f0f0, /* Efecto de hojas apiladas abajo */
                5px 5px 0px #f0f0f0;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Línea sutil que divide las páginas por detrás del lomo */
        .notebook-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(0, 0, 0, 0.05);
            z-index: 1;
        }

        /* LOMO DE ARGOLLAS METÁLICAS (Estilo image_7cb4c5.jpg) */
        .binder-spine {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 40px;
            height: 100%;
            background: linear-gradient(90deg, #999, #e8e8e8 30%, #fff 50%, #e8e8e8 70%, #888);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 5px 0 15px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 4rem 0;
        }

        /* Las argollas individuales */
        .ring {
            width: 65px;
            height: 16px;
            background: linear-gradient(to bottom, #777, #ddd 40%, #fff 60%, #666);
            border-radius: 8px;
            box-shadow: 0 5px 8px rgba(0,0,0,0.3);
            position: relative;
        }

        /* COLLAGE: POSICIONAMIENTO DE TARJETAS (VIDEOS) */
        .collage-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Estilo base tipo foto/recorte para los contenedores de video */
        .video-card {
            position: absolute;
            background-color: var(--borde-foto);
            padding: 12px 12px 18px 12px; /* Margen inferior más ancho estilo polaroid */
            box-shadow: 4px 8px 20px rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        /* Evita que los videos se salgan de sus marcos */
        .video-card video, 
        .video-card iframe {
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            border-radius: 2px;
            background-color: #000;
        }

        /* Hover sutil para interactuar con los recortes */
        .video-card:hover {
            transform: scale(1.02) !important; /* Mantiene la prioridad en el hover */
            box-shadow: 6px 12px 25px rgba(0, 0, 0, 0.18);
            z-index: 5;
        }

        /* POSICIONES EXACTAS BASADAS EN LA IMAGEN DE REFERENCIA */
        
        /* Video Grande Izquierdo (Caída Libre o el que quieras) */
        .card-left-main {
            width: 44%;
            left: 3%;
            top: 12%;
            transform: rotate(-3deg);
        }

        /* Video Chico Derecho Superior */
        .card-right-top {
            width: 28%;
            right: 14%;
            top: 10%;
            transform: rotate(-4deg);
        }

        /* Video Mediano Derecho Inferior (Tu Title Track o Soft Body) */
        .card-right-bottom {
            width: 32%;
            right: 4%;
            bottom: 8%;
            transform: rotate(2deg);
        }

        /* ELEMENTOS DECORATIVOS / STICKERS (Vibras NCT Wish / OMYO) */
        .sticker-text {
            position: absolute;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #a2b5cd;
            text-transform: uppercase;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .sticker-logo {
            right: 5%;
            top: 15%;
            transform: rotate(5deg);
            opacity: 0.7;
        }

        .star-draw {
            position: absolute;
            right: 7%;
            top: 26%;
            font-size: 2rem;
            color: #b0c4de;
            user-select: none;
        }

        /* Responsivo básico por si se ve en pantallas medianas */
        @media (max-width: 900px) {
            body { padding: 0; }
            .notebook-container { aspect-ratio: auto; flex-direction: column; height: auto; padding: 2rem 1rem; }
            .binder-spine { display: none; }
            .video-card { position: relative; width: 100% !important; left: 0 !important; right: 0 !important; top: 0 !important; bottom: 0 !important; transform: none !important; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>

    <div class="notebook-container">
        
        <!-- Espina de la carpeta metálica central -->
        <div class="binder-spine">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>

        <!-- Lienzo del Collage -->
        <div class="collage-canvas">
            
            <!-- VIDEO 1: LADO IZQUIERDO (PRINCIPAL) -->
            <div class="video-card card-left-main">
                <!-- Puedes usar la etiqueta <video> para archivos locales (.mp4) -->
                <video autoplay loop muted playsinline>
                    <source src="tu_video_simulacion_1.mp4" type="video/mp4">
                    Tu navegador no soporta video.
                </video>
            </div>

            <!-- VIDEO 2: LADO DERECHO SUPERIOR -->
            <div class="video-card card-right-top">
                <!-- O puedes incrustar directamente un iframe de tus videos de YouTube -->
                <!-- Nota: Asegúrate de usar la URL con '/embed/' como en este ejemplo de marcador -->
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&loop=1&playlist=dQw4w9WgXcQ" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <!-- VIDEO 3: LADO DERECHO INFERIOR -->
            <div class="video-card card-right-bottom">
                <video autoplay loop muted playsinline>
                    <source src="tu_video_simulacion_2.mp4" type="video/mp4">
                </video>
            </div>

            <!-- DETALLES GRÁFICOS (Como las firmas impresas de las hojas) -->
            <div class="sticker-text sticker-logo">LimonArbol</div>
            <div class="star-draw">✦</div>

        </div>

    </div>

</body>
</html>
