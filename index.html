<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapbook Portafolio — LimonArbol</title>
    <style>
        /* PALETA PASTEL (Tus colores LimonArbol + Vibras OMYO) */
        :root {
            --bg-lavanda: #dbe4f9;      
            --hoja-blanca: #fbfbfb;     
            --borde-foto: #ffffff;      
            --amarillo-pastel: #fff8cd;  
            --azul-pastel: #bce3ff;
            --texto-dark: #2a3b50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-lavanda);
            background-image: radial-gradient(rgba(255,255,255,0.5) 2px, transparent 0);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* CONTENEDOR DEL CUADERNO */
        .notebook-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9; 
            background-color: var(--hoja-blanca);
            border-radius: 8px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.15),
                -5px 5px 0px #f0f0f0, 
                5px 5px 0px #f0f0f0;
            display: flex;
            overflow: hidden;
        }

        .notebook-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(0, 0, 0, 0.05);
            z-index: 1;
        }

        /* LOMO DE ARGOLLAS */
        .binder-spine {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 40px;
            height: 100%;
            background: linear-gradient(90deg, #999, #e8e8e8 30%, #fff 50%, #e8e8e8 70%, #888);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 5px 0 15px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 4rem 0;
        }

        .ring {
            width: 65px;
            height: 16px;
            background: linear-gradient(to bottom, #777, #ddd 40%, #fff 60%, #666);
            border-radius: 8px;
            box-shadow: 0 5px 8px rgba(0,0,0,0.3);
        }

        .collage-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* NUEVO LOGO ESCALONADO ESTILO EDITORIAL */
        .brand-logo-staggered {
            position: absolute;
            top: 6%;
            left: 4%;
            display: flex;
            flex-direction: column;
            gap: 2px;
            z-index: 4;
            user-select: none;
        }

        .brand-logo-staggered .word-limon {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--texto-dark);
            margin-left: 100px; /* Desplazado a la derecha */
        }

        .brand-logo-staggered .word-arbol {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--texto-dark);
            margin-left: 170px; /* Más desplazado a la derecha */
            background: linear-gradient(180deg, transparent 60%, var(--amarillo-pastel) 60%);
            padding-right: 10px;
        }

        .brand-logo-staggered .word-portfolio {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #a2b5cd;
            text-transform: lowercase;
            margin-left: 30px; /* Menos sangría, justo abajo */
            margin-top: 4px;
        }

        /* CONTENEDORES DE VIDEO */
        .video-card {
            position: absolute;
            background-color: var(--borde-foto);
            padding: 12px 12px 18px 12px; 
            box-shadow: 4px 8px 20px rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .video-card video, 
        .video-card iframe {
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            border-radius: 2px;
            background-color: #000;
        }

        .video-card:hover {
            transform: scale(1.02) !important; 
            box-shadow: 6px 12px 25px rgba(0, 0, 0, 0.18);
            z-index: 5;
        }

        /* AJUSTE DE POSICIONES */
        /* Moví el video izquierdo un poco hacia abajo para darle aire al nuevo logo */
        .card-left-main {
            width: 42%;
            left: 4%;
            bottom: 8%;
            transform: rotate(-2deg);
        }

        .card-right-top {
            width: 28%;
            right: 14%;
            top: 10%;
            transform: rotate(-4deg);
        }

        .card-right-bottom {
            width: 32%;
            right: 4%;
            bottom: 8%;
            transform: rotate(2deg);
        }

        /* DECORACIONES */
        .star-draw {
            position: absolute;
            right: 6%;
            top: 25%;
            font-size: 2rem;
            color: #b0c4de;
        }

        @media (max-width: 900px) {
            body { padding: 0; }
            .notebook-container { aspect-ratio: auto; flex-direction: column; height: auto; padding: 2rem 1rem; }
            .binder-spine, .brand-logo-staggered { display: none; }
            .video-card { position: relative; width: 100% !important; left: 0 !important; right: 0 !important; top: 0 !important; bottom: 0 !important; transform: none !important; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>

    <div class="notebook-container">
        
        <!-- Argollas -->
        <div class="binder-spine">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>

        <div class="collage-canvas">
            
            <!-- TU NUEVO LOGO PERSONALIZADO ESCALONADO -->
            <div class="brand-logo-staggered">
                <span class="word-limon">LIMON</span>
                <span class="word-arbol">ARBOL</span>
                <span class="word-portfolio">portafolio</span>
            </div>
            
            <!-- VIDEO 1: IZQUIERDO (Ajustado abajo del logo) -->
            <div class="video-card card-left-main">
                <video autoplay loop muted playsinline>
                    <source src="tu_video_simulacion_1.mp4" type="video/mp4">
                </video>
            </div>

            <!-- VIDEO 2: DERECHO SUPERIOR (El Rickroll de la suerte 🌟) -->
            <div class="video-card card-right-top">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&loop=1&playlist=dQw4w9WgXcQ" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <!-- VIDEO 3: DERECHO INFERIOR -->
            <div class="video-card card-right-bottom">
                <video autoplay loop muted playsinline>
                    <source src="tu_video_simulacion_2.mp4" type="video/mp4">
                </video>
            </div>

            <!-- Detalle de estrella fija -->
            <div class="star-draw">✦</div>

        </div>

    </div>

</body>
</html>
