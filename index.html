<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portafolio LimonArbol</title>
    <style>
        body {
            background-color: #e0f7fa;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: #ffeb3b; 
            margin-bottom: 30px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 
            gap: 20px;
            padding: 20px;
        }

        .grid-item {
            background-color: white;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #b3e5fc; 
            text-align: center;
            transition: transform 0.2s;
            text-decoration: none; 
            color: #333;
            display: block;
        }

        .grid-item:hover {
            transform: scale(1.05); 
            border-color: #fff176; 
        }

        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .info {
            padding: 10px;
        }

        .title {
            font-weight: bold;
            font-size: 1.1em;
            text-transform: uppercase;
        }

        .status {
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PORTAFOLIO DE FÍSICA Y SIMULACIÓN</h1>
        <p>LimonArbol</p>
    </div>

    <div class="grid-container">
        <!-- Ejemplo de un elemento de la cuadrícula -->
        <a href="TU_LINK_DE_YOUTUBE_AQUI" class="grid-item">
            <img src="RUTA_A_TU_IMAGEN_DE_CAIDA_LIBRE.jpg" alt="Caida libre">
            <div class="info">
                <div class="title">CAIDA LIBRE</div>
                <div class="status">PROXIMAMENTE</div>
            </div>
        </a>

        

    </div>

</body>
</html>
